<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Market - Giriş</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="card login-box">
            <h1>🌍 Global Market</h1>
            <p style="color:var(--text-muted)">Küresel ticaret ekonomisine katılın.</p>
            <form style="margin-top: 30px;" action="/login" method="POST" id="loginForm">
                <input type="text" name="username" id="username" placeholder="Kullanıcı Adı" required autocomplete="username">
                <input type="password" name="password" id="password" placeholder="Şifre" required autocomplete="current-password" style="margin-top:10px;">
                <button type="submit" class="btn" style="width:100%; margin-top:20px;">Pazara Gir</button>
            </form>
            <div style="margin-top: 20px; text-align: center;">
                <a href="/register" style="color:var(--primary); text-decoration:none;">Hesabın yok mu? Kayıt Ol</a>
            </div>
        </div>
    </div>
    <script src="/static/js/main.js"></script>
</body>
</html>
