name: Deploy to Hugging Face

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install huggingface_hub
    
    - name: Deploy to Hugging Face
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        echo "Starting deployment to Paramen42/GlobalMarket..."
        
        # Basit deploy script
        python -c "
        import os
        from huggingface_hub import HfApi
        
        try:
            api = HfApi(token=os.environ['HF_TOKEN'])
            repo_id = 'Paramen42/GlobalMarket'
            
            print(f'Deploying to {repo_id}...')
            
            # Space var mi kontrol et
            space_info = api.space_info(repo_id=repo_id)
            print(f'Space found: {space_info.id}')
            
            # Dosyalari yukle
            api.upload_folder(
                folder_path='.',
                repo_id=repo_id,
                repo_type='space',
                token=os.environ['HF_TOKEN']
            )
            
            print('Deployment successful!')
            
        except Exception as e:
            print(f'Error: {e}')
            exit(1)
        "
